name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: backend
        run: npm install
      - name: Type-check
        working-directory: backend
        run: npx tsc --noEmit
      - name: Run tests (Jest + in-memory MongoDB)
        working-directory: backend
        run: npx jest --ci

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build (static export)
        working-directory: frontend
        run: npx next build

  ml-service:
    name: ML service — tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: ml-service
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: ml-service
        run: python -m pytest tests -q
